<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yaska Lab</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0d1b2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            gap: 48px;
        }

        img.logo {
            width: 180px;
        }

        button {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #2563d8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.03em;
        }

        button:active {
            background: #1a4db8;
        }
    </style>
</head>
<body>
    <img class="logo" src="branding/YASKA_LOGO/RGB/PNG/yaska_logo_RGB_negatif.png" alt="Yaska" />
    <button onclick="window.location.href='compromise.html'">Compromise my device</button>
</body>
</html>
